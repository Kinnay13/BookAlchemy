{% extends "base.html" %}

{% block title %}Add Author - BookAlchemy{% endblock %}

{% block content %}
  <section class="page-header">
    <h1>Add Author</h1>
    <p>Add writers first so new books can be connected to the right author.</p>
  </section>

  {% if success %}
    <p class="notice">Author successfully added.</p>
  {% endif %}

  <form class="form-panel" action="{{ url_for('add_author') }}" method="POST">
    <div class="field">
      <label for="name">Author Name</label>
      <input type="text" id="name" name="name" required>
    </div>

    <div class="field">
      <label for="birthdate">Birthdate</label>
      <input type="date" id="birthdate" name="birthdate" required>
    </div>

    <div class="field">
      <label for="date_of_death">Date of Death</label>
      <input type="date" id="date_of_death" name="date_of_death">
    </div>

    <input type="submit" value="Add Author">
  </form>
{% endblock %}
